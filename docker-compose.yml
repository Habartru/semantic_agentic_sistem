version: "3.8"

networks:
  seo-agents-network:
    driver: bridge

services:
  app:
    build: .
    container_name: seo-agents-app
    ports:
      - "8001:8000"
    env_file:
      - .env
    volumes:
      - seo-agents-data:/app/data
    networks:
      - seo-agents-network
    restart: unless-stopped

volumes:
  seo-agents-data:
